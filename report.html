<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report - ACH</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a2e;
      --bg-card: #16213e;
      --bg-input: #1a1a2e;
      --accent: #e94560;
      --accent-hover: #ff6b81;
      --accent2: #4da6ff;
      --text-primary: #eee;
      --text-secondary: #a0a0b0;
      --border: #2a2a4a;
      --success: #00d68f;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .navbar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar-brand {
      font-size: 18px;
      font-weight: 800;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 1px;
    }

    .nav-links { display: flex; gap: 2px; align-items: center; }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 14px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 12px;
      color: var(--text-secondary);
      transition: all 0.2s;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    .nav-link:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
    .nav-link.active { background: rgba(77,166,255,0.12); color: var(--accent2); }
    .nav-link svg { flex-shrink: 0; opacity: 0.85; }
    .nav-link.active svg { opacity: 1; }

    .navbar-right { display: flex; align-items: center; gap: 12px; }
    .navbar-right span { color: var(--text-secondary); font-size: 13px; }

    .btn-logout {
      padding: 7px 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .btn-logout:hover { border-color: var(--accent); color: var(--accent); }

    .main-content {
      padding: 24px;
    }

    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .report-header h1 {
      font-size: 24px;
      color: var(--accent);
    }

    .report-header .subtitle {
      color: var(--text-secondary);
      font-size: 13px;
      margin-top: 4px;
    }

    .upload-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .upload-btn {
      padding: 10px 24px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .upload-btn:hover {
      background: var(--accent-hover);
    }

    .file-name {
      color: var(--text-secondary);
      font-size: 13px;
    }

    #fileInput {
      display: none;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .search-box input {
      padding: 10px 16px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      width: 300px;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--accent2);
    }

    .table-container {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-card);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      white-space: nowrap;
    }

    thead tr {
      background: var(--bg-secondary);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    th {
      padding: 12px 14px;
      text-align: left;
      color: var(--accent2);
      font-weight: 600;
      font-size: 7px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid var(--border);
      cursor: pointer;
      user-select: none;
    }

    th:hover {
      color: var(--accent);
    }

    th .sort-arrow {
      margin-left: 4px;
      font-size: 10px;
    }

    td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
    }

    tr:hover td {
      background: rgba(77, 166, 255, 0.05);
    }

    tr:last-child td {
      border-bottom: none;
    }

    .num-positive { color: var(--success); }
    .num-negative { color: var(--accent); }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-secondary);
    }

    .empty-state h2 {
      font-size: 20px;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .empty-state p {
      font-size: 14px;
      margin-bottom: 24px;
    }

    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      min-width: 150px;
    }

    .stat-card .label {
      color: var(--text-secondary);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-card .value {
      font-size: 22px;
      font-weight: 700;
      margin-top: 4px;
    }

    .row-count {
      color: var(--text-secondary);
      font-size: 13px;
      margin-bottom: 8px;
    }

    @media (max-width: 768px) {
      .navbar { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
      .main-content { padding: 16px; }
      .report-header { flex-direction: column; align-items: flex-start; }
      .search-box input { width: 100%; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="https://extraordinary-elf-0e2105.netlify.app/" class="navbar-brand">ACH</a>
    <div class="nav-links">
      <a href="https://extraordinary-elf-0e2105.netlify.app/report.html" class="nav-link active">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>
        Report
      </a>
      <a href="https://extraordinary-elf-0e2105.netlify.app/check.html" class="nav-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Monitor
      </a>
      <a href="https://extraordinary-elf-0e2105.netlify.app/YESTERDAY.html" class="nav-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Yesterday
      </a>
    </div>
    <div class="navbar-right">
      <span id="userEmail"></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="main-content">
    <div class="report-header">
      <div>
        <h1>ACHLYS Daily Summary</h1>
        <div class="subtitle" id="reportSubtitle">Loading report data...</div>
      </div>
      <div class="upload-area">
        <select id="dateSelect" style="padding:10px 16px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:14px;cursor:pointer;" onchange="loadReportByDate()">
          <option value="">-- Select Date --</option>
        </select>
        <button class="upload-btn" style="background:var(--accent2);" onclick="loadReportByDate()">Refresh</button>
      </div>
    </div>

    <div class="stats-bar" id="statsBar" style="display:none;"></div>

    <div class="search-box" id="searchBox" style="display:none;">
      <input type="text" id="searchInput" placeholder="Search in table..." oninput="filterTable()">
    </div>

    <div class="row-count" id="rowCount"></div>

    <div class="table-container" id="tableContainer">
      <div class="empty-state" id="emptyState">
        <h2>Loading Report...</h2>
        <p>Auto-loading from database...</p>
      </div>
    </div>
  </div>

  <script>
    // ===== AUTH =====
    const { createClient } = supabase;
    const SUPABASE_URL = 'https://exrmnluywpzbhqjngjfz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4cm1ubHV5d3B6Ymhxam5namZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzY2MjMsImV4cCI6MjA4OTg1MjYyM30.DNqpguiybLmt0Oz8PMGRcx_U6dMpAMt7fkdKSDal5d8';
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function checkAuth() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      document.getElementById('userEmail').textContent = session.user.email;
    }

    async function logout() {
      await sb.auth.signOut();
      window.location.href = 'index.html';
    }

    checkAuth();

    // ===== DATA STATE =====
    let allData = [];
    let headers = [];
    let sortCol = -1;
    let sortAsc = true;

    // ===== AUTO-LOAD FROM SUPABASE =====
    const HIDDEN_COLS = ['Agency Fee', 'Total Commission (ZAR)'];
    const BRAND_ALIASES = { 'TICTACBETS': 'TT' };
    const DB_HEADERS = ['Month','Platform','Source','Campaign Name','GEO','Manager','Brand','Spend','Agency Fee','Real Spend','Installs','Clicks','Reg','FTD','eCPA','Income','Profit','ROI','Total Commission (ZAR)'];
    const DB_COLS = ['month','platform','source','campaign_name','geo','manager','brand','spend','agency_fee','real_spend','installs','clicks','reg','ftd','ecpa','income','profit','roi','total_commission_zar'];

    async function loadAvailableDates() {
      const { data, error } = await sb.from('report_data')
        .select('report_date')
        .order('report_date', { ascending: false });
      if (error || !data) return;

      const uniqueDates = [...new Set(data.map(r => r.report_date))];
      const sel = document.getElementById('dateSelect');
      sel.innerHTML = '';
      uniqueDates.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = d;
        if (i === 0) opt.selected = true;
        sel.appendChild(opt);
      });

      // Auto-load latest date
      if (uniqueDates.length > 0) {
        loadReportByDate();
      }
    }

    async function loadReportByDate() {
      const selectedDate = document.getElementById('dateSelect').value;
      if (!selectedDate) return;

      document.getElementById('reportSubtitle').textContent = 'Loading...';

      const { data, error } = await sb.from('report_data')
        .select('*')
        .eq('report_date', selectedDate)
        .order('id', { ascending: true });

      if (error) {
        document.getElementById('reportSubtitle').textContent = 'Error loading: ' + error.message;
        return;
      }

      if (!data || data.length === 0) {
        document.getElementById('reportSubtitle').textContent = 'No data found for ' + selectedDate;
        return;
      }

      // Set subtitle
      const subtitle = data[0]?.subtitle || `Report for ${selectedDate}`;
      document.getElementById('reportSubtitle').textContent = subtitle;

      // Convert to array format for the table renderer
      headers = [...DB_HEADERS];
      allData = data
        .filter(row => row.month && String(row.month).toUpperCase() !== 'TOTAL')
        .map(row => DB_COLS.map(col => row[col] ?? ''));

      buildStats();
      renderTable(allData);
      document.getElementById('searchBox').style.display = 'flex';
      const empty = document.getElementById('emptyState');
      if (empty) empty.remove();
    }

    // Load on page ready
    loadAvailableDates();


    function buildStats() {
      const bar = document.getElementById('statsBar');
      bar.style.display = 'flex';
      bar.innerHTML = '';

      const spendIdx = headers.indexOf('Spend');
      const ftdIdx = headers.indexOf('FTD');
      const profitIdx = headers.indexOf('Profit');
      const incomeIdx = headers.indexOf('Income');

      const sum = (idx) => {
        if (idx < 0) return 0;
        return allData.reduce((s, r) => s + (parseFloat(r[idx]) || 0), 0);
      };

      const stats = [
        { label: 'Total Spend', value: formatNum(sum(spendIdx)), color: 'var(--accent2)' },
        { label: 'Total FTD', value: Math.round(sum(ftdIdx)).toLocaleString(), color: 'var(--accent)' },
        { label: 'Total Income', value: formatNum(sum(incomeIdx)), color: 'var(--success)' },
        { label: 'Total Profit', value: formatNum(sum(profitIdx)), color: sum(profitIdx) >= 0 ? 'var(--success)' : 'var(--accent)' },
        { label: 'Rows', value: allData.length, color: 'var(--text-primary)' },
      ];

      stats.forEach(s => {
        const card = document.createElement('div');
        card.className = 'stat-card';
        card.innerHTML = `<div class="label">${s.label}</div><div class="value" style="color:${s.color}">${s.value}</div>`;
        bar.appendChild(card);
      });
    }

    function formatNum(n) {
      return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function renderTable(data) {
      const container = document.getElementById('tableContainer');
      document.getElementById('rowCount').textContent = `Showing ${data.length} of ${allData.length} rows`;

      let html = '<table><thead><tr>';
      headers.forEach((h, i) => {
        if (HIDDEN_COLS.includes(h)) return;
        const arrow = sortCol === i ? (sortAsc ? ' ▲' : ' ▼') : '';
        html += `<th onclick="sortTable(${i})">${h}<span class="sort-arrow">${arrow}</span></th>`;
      });
      html += '</tr></thead><tbody>';

      data.forEach(row => {
        html += '<tr>';
        headers.forEach((h, i) => {
          if (HIDDEN_COLS.includes(h)) return;
          let val = row[i] !== undefined ? row[i] : '';
          let cls = '';

          // Apply brand aliases
          if (h === 'Brand' && BRAND_ALIASES[val]) val = BRAND_ALIASES[val];

          // Color code numeric values
          if (typeof val === 'number') {
            if (h === 'Profit' || h === 'ROI') {
              cls = val >= 0 ? 'num-positive' : 'num-negative';
            }
            // Format numbers
            if (h === 'ROI') {
              val = (val * 100).toFixed(1) + '%';
            } else if (['Spend', 'Real Spend', 'Income', 'Profit', 'eCPA'].includes(h)) {
              val = formatNum(val);
            } else if (Number.isInteger(val)) {
              val = val.toLocaleString();
            } else {
              val = formatNum(val);
            }
          }

          html += `<td class="${cls}">${val}</td>`;
        });
        html += '</tr>';
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    }

    function sortTable(colIdx) {
      if (sortCol === colIdx) {
        sortAsc = !sortAsc;
      } else {
        sortCol = colIdx;
        sortAsc = true;
      }

      allData.sort((a, b) => {
        let va = a[colIdx] ?? '';
        let vb = b[colIdx] ?? '';

        if (typeof va === 'number' && typeof vb === 'number') {
          return sortAsc ? va - vb : vb - va;
        }

        va = String(va).toLowerCase();
        vb = String(vb).toLowerCase();
        return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
      });

      filterTable();
    }

    function filterTable() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      if (!q) {
        renderTable(allData);
        return;
      }

      const filtered = allData.filter(row =>
        row.some(cell => String(cell).toLowerCase().includes(q))
      );
      renderTable(filtered);
    }
  </script>

</body>
</html>
