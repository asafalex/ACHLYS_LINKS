    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {

      --bg-card: #16213e;
      --bg-input: #1a1a2e;

    .btn-logout {
      padding: 8px 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .monitor-link {
      color: white;
      text-decoration: none;
      font-weight: 700;
