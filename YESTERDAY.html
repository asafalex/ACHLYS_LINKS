<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yesterday Delta - ACH</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a2e;
      --bg-card: #16213e;
      --bg-input: #1a1a2e;
      --accent: #e94560;
      --accent-hover: #ff6b81;
      --accent2: #4da6ff;
      --text-primary: #eee;
      --text-secondary: #a0a0b0;
      --border: #2a2a4a;
      --success: #00d68f;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .navbar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar-brand {
      font-size: 18px;
      font-weight: 800;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 1px;
    }

    .nav-links { display: flex; gap: 2px; align-items: center; }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 14px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 12px;
      color: var(--text-secondary);
      transition: all 0.2s;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    .nav-link:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
    .nav-link.active { background: rgba(77,166,255,0.12); color: var(--accent2); }
    .nav-link svg { flex-shrink: 0; opacity: 0.85; }
    .nav-link.active svg { opacity: 1; }

    .navbar-right { display: flex; align-items: center; gap: 12px; }
    .navbar-right span { color: var(--text-secondary); font-size: 13px; }

    .btn-logout {
      padding: 7px 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .btn-logout:hover { border-color: var(--accent); color: var(--accent); }

    .main-content {
      padding: 24px;
    }

    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .report-header h1 {
      font-size: 24px;
      color: var(--accent);
    }

    .report-header .subtitle {
      color: var(--text-secondary);
      font-size: 13px;
      margin-top: 4px;
    }

    .upload-area {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .upload-btn {
      padding: 10px 24px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .upload-btn:hover {
      background: var(--accent-hover);
    }

    select {
      padding: 10px 16px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .search-box input {
      padding: 10px 16px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      width: 300px;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--accent2);
    }

    .table-container {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-card);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      white-space: nowrap;
    }

    thead tr {
      background: var(--bg-secondary);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    th {
      padding: 12px 14px;
      text-align: left;
      color: var(--accent2);
      font-weight: 600;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid var(--border);
      cursor: pointer;
      user-select: none;
    }

    th:hover { color: var(--accent); }

    th .sort-arrow {
      margin-left: 4px;
      font-size: 10px;
    }

    td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
    }

    tr:hover td {
      background: rgba(77, 166, 255, 0.05);
    }

    tr:last-child td { border-bottom: none; }

    .num-positive { color: var(--success); font-weight: 600; }
    .num-negative { color: var(--accent); font-weight: 600; }
    .num-zero     { color: var(--text-secondary); }

    tfoot tr {
      background: var(--bg-secondary);
      border-top: 2px solid var(--border);
    }
    tfoot td { padding: 10px 14px; font-size: 12px; }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-secondary);
    }

    .empty-state h2 {
      font-size: 20px;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .empty-state p {
      font-size: 14px;
      margin-bottom: 24px;
    }

    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      min-width: 160px;
    }

    .stat-card .label {
      color: var(--text-secondary);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-card .value {
      font-size: 22px;
      font-weight: 700;
      margin-top: 4px;
    }

    .row-count {
      color: var(--text-secondary);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .date-range-label {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      color: var(--accent2);
    }

    @media (max-width: 768px) {
      .navbar { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
      .main-content { padding: 16px; }
      .report-header { flex-direction: column; align-items: flex-start; }
      .search-box input { width: 100%; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="https://extraordinary-elf-0e2105.netlify.app/" class="navbar-brand">ACH</a>
    <div class="nav-links">
      <a href="https://extraordinary-elf-0e2105.netlify.app/report.html" class="nav-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>
        Report
      </a>
      <a href="https://extraordinary-elf-0e2105.netlify.app/check.html" class="nav-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Monitor
      </a>
      <a href="https://extraordinary-elf-0e2105.netlify.app/YESTERDAY.html" class="nav-link active">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Yesterday
      </a>
    </div>
    <div class="navbar-right">
      <span id="userEmail"></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="main-content">
    <div class="report-header">
      <div>
        <h1>ACHLYS Delta — Today vs Yesterday</h1>
        <div class="subtitle" id="reportSubtitle">Loading comparison data...</div>
      </div>
      <div class="upload-area">
        <select id="todaySelect" onchange="loadDelta()">
          <option value="">-- Select "Today" Date --</option>
        </select>
        <span class="date-range-label" id="prevDateLabel">vs —</span>
        <button class="upload-btn" style="background:var(--accent2);" onclick="loadAvailableDates()">Refresh</button>
      </div>
    </div>

    <div class="stats-bar" id="statsBar" style="display:none;"></div>

    <div class="search-box" id="searchBox" style="display:none;">
      <input type="text" id="searchInput" placeholder="Search in table..." oninput="filterTable()">
    </div>

    <div class="row-count" id="rowCount"></div>

    <div class="table-container" id="tableContainer">
      <div class="empty-state" id="emptyState">
        <h2>Loading Delta Report...</h2>
        <p>Auto-loading latest two dates from database...</p>
      </div>
    </div>
  </div>

  <script>
    // ===== AUTH =====
    const { createClient } = supabase;
    const SUPABASE_URL = 'https://exrmnluywpzbhqjngjfz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4cm1ubHV5d3B6Ymhxam5namZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzY2MjMsImV4cCI6MjA4OTg1MjYyM30.DNqpguiybLmt0Oz8PMGRcx_U6dMpAMt7fkdKSDal5d8';
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function checkAuth() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      document.getElementById('userEmail').textContent = session.user.email;
    }

    async function logout() {
      await sb.auth.signOut();
      window.location.href = 'index.html';
    }

    checkAuth();

    // ===== CONFIG =====
    const HIDDEN_COLS = ['Agency Fee', 'Total Commission (ZAR)'];
    const VALUE_ALIASES  = { 'TICTACBETS': 'TT', 'MOLOCO': 'MO' };
    const HEADER_ALIASES = { 'Platform': 'PL' };

    const DB_HEADERS = ['Month','Platform','Source','Campaign Name','GEO','Manager','Brand','Spend','Agency Fee','Real Spend','Installs','Clicks','Reg','FTD','eCPA','Income','Profit','ROI','Total Commission (ZAR)'];
    const DB_COLS    = ['month','platform','source','campaign_name','geo','manager','brand','spend','agency_fee','real_spend','installs','clicks','reg','ftd','ecpa','income','profit','roi','total_commission_zar'];

    // Key columns used to match rows between dates
    const KEY_COLS   = ['Month','Platform','Source','Campaign Name','GEO','Manager','Brand'];
    // Numeric columns where we calculate delta
    const DELTA_COLS = ['Spend','Real Spend','Installs','Clicks','Reg','FTD','eCPA','Income','Profit','ROI'];

    // ===== STATE =====
    let allDates   = [];
    let deltaRows  = [];   // computed delta rows
    let sortCol    = -1;
    let sortAsc    = true;

    // ===== LOAD AVAILABLE DATES =====
    async function loadAvailableDates() {
      const { data, error } = await sb.from('report_data')
        .select('report_date')
        .order('report_date', { ascending: false });

      if (error || !data) return;

      allDates = [...new Set(data.map(r => r.report_date))];

      const sel = document.getElementById('todaySelect');
      sel.innerHTML = '';
      allDates.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = d;
        if (i === 0) opt.selected = true;
        sel.appendChild(opt);
      });

      if (allDates.length >= 2) loadDelta();
      else document.getElementById('reportSubtitle').textContent = 'Need at least 2 dates in database.';
    }

    // ===== FETCH ROWS FOR A DATE =====
    async function fetchDate(date) {
      const { data, error } = await sb.from('report_data')
        .select('*')
        .eq('report_date', date)
        .order('id', { ascending: true });
      if (error || !data) return [];
      return data.filter(row => row.month && String(row.month).toUpperCase() !== 'TOTAL');
    }

    // ===== BUILD ROW KEY =====
    function rowKey(row) {
      return KEY_COLS.map(h => {
        const col = DB_COLS[DB_HEADERS.indexOf(h)];
        return String(row[col] ?? '').trim().toLowerCase();
      }).join('||');
    }

    // ===== LOAD DELTA =====
    async function loadDelta() {
      const todayDate = document.getElementById('todaySelect').value;
      if (!todayDate) return;

      // Find the previous date in the list
      const todayIdx = allDates.indexOf(todayDate);
      if (todayIdx < 0 || todayIdx >= allDates.length - 1) {
        document.getElementById('reportSubtitle').textContent = 'No previous date available to compare.';
        return;
      }
      const prevDate = allDates[todayIdx + 1];

      document.getElementById('prevDateLabel').textContent = `vs  ${prevDate}`;
      document.getElementById('reportSubtitle').textContent = 'Loading...';

      const [todayData, prevData] = await Promise.all([
        fetchDate(todayDate),
        fetchDate(prevDate)
      ]);

      // Store raw totals for stats bar (always correct, independent of row matching)
      const rawSum = (rows, colName) => {
        const col = DB_COLS[DB_HEADERS.indexOf(colName)];
        return rows.reduce((s, r) => s + (parseFloat(r[col]) || 0), 0);
      };
      window._todayTotals = { Spend: rawSum(todayData,'Spend'), FTD: rawSum(todayData,'FTD'), Income: rawSum(todayData,'Income'), Profit: rawSum(todayData,'Profit') };
      window._prevTotals  = { Spend: rawSum(prevData,'Spend'),  FTD: rawSum(prevData,'FTD'),  Income: rawSum(prevData,'Income'),  Profit: rawSum(prevData,'Profit') };

      // Build lookup map from previous date
      const prevMap = {};
      prevData.forEach(row => { prevMap[rowKey(row)] = row; });

      // Compute delta rows
      deltaRows = todayData.map(tRow => {
        const key   = rowKey(tRow);
        const pRow  = prevMap[key] || null;
        const out   = {};

        DB_HEADERS.forEach((h, idx) => {
          const col = DB_COLS[idx];
          if (DELTA_COLS.includes(h)) {
            const tVal = parseFloat(tRow[col]) || 0;
            const pVal = pRow ? (parseFloat(pRow[col]) || 0) : 0;
            out[h] = tVal - pVal;
          } else {
            let v = tRow[col] ?? '';
            if (typeof v === 'string' && VALUE_ALIASES[v]) v = VALUE_ALIASES[v];
            out[h] = v;
          }
        });

        out._isNew = !pRow;  // flag: this row has no match in previous date
        return out;
      });

      document.getElementById('reportSubtitle').textContent =
        `Delta: ${todayDate}  →  ${prevDate}`;

      buildStats();
      renderTable(deltaRows);
      document.getElementById('searchBox').style.display = 'flex';
      const empty = document.getElementById('emptyState');
      if (empty) empty.remove();
    }

    // ===== STATS BAR =====
    function buildStats() {
      const bar = document.getElementById('statsBar');
      bar.style.display = 'flex';
      bar.innerHTML = '';

      const t = window._todayTotals || {};
      const p = window._prevTotals  || {};

      const dSpend  = (t.Spend  || 0) - (p.Spend  || 0);
      const dFTD    = (t.FTD    || 0) - (p.FTD    || 0);
      const dIncome = (t.Income || 0) - (p.Income || 0);
      const dProfit = (t.Profit || 0) - (p.Profit || 0);

      const stats = [
        { label: 'Δ Spend',  value: fmtDelta(dSpend),            color: dSpend  >= 0 ? 'var(--success)' : 'var(--accent)' },
        { label: 'Δ FTD',    value: fmtDeltaInt(dFTD),           color: dFTD    >= 0 ? 'var(--success)' : 'var(--accent)' },
        { label: 'Δ Income', value: fmtDelta(dIncome),           color: dIncome >= 0 ? 'var(--success)' : 'var(--accent)' },
        { label: 'Δ Profit', value: fmtDelta(dProfit),           color: dProfit >= 0 ? 'var(--success)' : 'var(--accent)' },
        { label: 'Rows',     value: deltaRows.length,            color: 'var(--text-primary)' },
      ];

      stats.forEach(s => {
        const card = document.createElement('div');
        card.className = 'stat-card';
        card.innerHTML = `<div class="label">${s.label}</div><div class="value" style="color:${s.color}">${s.value}</div>`;
        bar.appendChild(card);
      });
    }

    // ===== RENDER TABLE =====
    function renderTable(data) {
      const container = document.getElementById('tableContainer');
      document.getElementById('rowCount').textContent = `Showing ${data.length} of ${deltaRows.length} rows`;

      let html = '<table><thead><tr>';
      DB_HEADERS.forEach((h, i) => {
        if (HIDDEN_COLS.includes(h)) return;
        const arrow = sortCol === i ? (sortAsc ? ' ▲' : ' ▼') : '';
        const isDelta = DELTA_COLS.includes(h);
        const baseLabel = HEADER_ALIASES[h] || h;
        const label = isDelta ? `Δ ${baseLabel}` : baseLabel;
        html += `<th onclick="sortTable(${i})">${label}<span class="sort-arrow">${arrow}</span></th>`;
      });
      html += '</tr></thead><tbody>';

      data.forEach(row => {
        const isNew = row._isNew;
        html += `<tr${isNew ? ' style="opacity:0.75;"' : ''}>`;
        DB_HEADERS.forEach((h, i) => {
          if (HIDDEN_COLS.includes(h)) return;
          let val = row[h] !== undefined ? row[h] : '';
          let cls = '';

          if (DELTA_COLS.includes(h)) {
            const n = parseFloat(val) || 0;
            if (n > 0)      cls = 'num-positive';
            else if (n < 0) cls = 'num-negative';
            else             cls = 'num-zero';

            if (h === 'ROI') {
              val = (n >= 0 ? '+' : '') + Math.trunc(n * 100) + '%';
            } else if (['Spend','Real Spend','Income','Profit','eCPA'].includes(h)) {
              val = (n >= 0 ? '+' : '') + formatNum(n);
            } else {
              val = (n >= 0 ? '+' : '') + Math.round(n).toLocaleString();
            }
          }

          html += `<td class="${cls}">${val}</td>`;
        });
        html += '</tr>';
      });

      // ===== SUMMARY ROW =====
      const sumByKey = (key) => data.reduce((s, r) => s + (parseFloat(r[key]) || 0), 0);
      const totSp = sumByKey('Spend'), totFT = sumByKey('FTD'), totIn = sumByKey('Income');

      html += '</tbody><tfoot><tr>';
      let isFirstSummary = true;
      DB_HEADERS.forEach((h) => {
        if (HIDDEN_COLS.includes(h)) return;
        if (isFirstSummary) {
          html += `<td style="color:var(--accent2);font-weight:800;font-size:11px;letter-spacing:0.5px;">Σ TOTAL</td>`;
          isFirstSummary = false; return;
        }
        if (DELTA_COLS.includes(h)) {
          const v = sumByKey(h);
          let fmt = '';
          if (h === 'ROI') fmt = (v >= 0 ? '+' : '') + Math.trunc(v * 100) + '%';
          else if (['Spend','Real Spend','Income','Profit','eCPA'].includes(h)) fmt = (v >= 0 ? '+' : '') + formatNum(v);
          else fmt = (v >= 0 ? '+' : '') + Math.trunc(v).toLocaleString();
          const c = h === 'eCPA' ? 'var(--accent2)' : (v >= 0 ? 'var(--success)' : 'var(--accent)');
          html += `<td style="color:${c};font-weight:700;">${fmt}</td>`;
        } else {
          html += '<td></td>';
        }
      });
      html += '</tr></tfoot></table>';
      container.innerHTML = html;
    }

    // ===== SORT =====
    function sortTable(colIdx) {
      const h = DB_HEADERS[colIdx];
      if (sortCol === colIdx) sortAsc = !sortAsc;
      else { sortCol = colIdx; sortAsc = true; }

      deltaRows.sort((a, b) => {
        let va = a[h] ?? '';
        let vb = b[h] ?? '';
        if (typeof va === 'number' && typeof vb === 'number')
          return sortAsc ? va - vb : vb - va;
        va = String(va).toLowerCase();
        vb = String(vb).toLowerCase();
        return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
      });

      filterTable();
    }

    // ===== FILTER =====
    function filterTable() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      if (!q) { renderTable(deltaRows); return; }
      const filtered = deltaRows.filter(row =>
        Object.values(row).some(v => String(v).toLowerCase().includes(q))
      );
      renderTable(filtered);
    }

    // ===== HELPERS =====
    function formatNum(n) {
      return Math.trunc(n).toLocaleString('en-US');
    }
    function fmtDelta(n) {
      return (n >= 0 ? '+' : '') + formatNum(n);
    }
    function fmtDeltaInt(n) {
      return (n >= 0 ? '+' : '') + Math.trunc(n).toLocaleString();
    }

    // ===== INIT =====
    loadAvailableDates();
  </script>

</body>
</html>
